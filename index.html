<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <title>Projeto Realidade Mista - Sólidos Geométricos</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>
  <body>
    <a-scene webxr="optionalFeatures: hit-test;">
      
      <a-entity hide-on-enter-ar>
        <a-sky color="#2C3E50"></a-sky>
        <a-grid position="0 0 0"></a-grid>
      </a-entity>

      <a-dodecahedron position="0 1.5 -2.5" radius="0.5" color="#E74C3C" wireframe="false"
                      animation="property: rotation; to: 360 360 0; loop: true; dur: 6000">
      </a-dodecahedron>

      <a-text value="Sólido no Mundo Real" position="0 2.3 -2.5" align="center" color="#F1C40F" width="4"
              animation="property: position; dir: alternate; to: 0 2.4 -2.5; loop: true; dur: 2000">
      </a-text>

      <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
      <a-light type="directional" position="1 2 1" intensity="0.5"></a-light>

      <a-entity camera position="0 1.6 0" look-controls></a-entity>
      
    </a-scene>
  </body>
</html>
