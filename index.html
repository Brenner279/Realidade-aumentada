<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <title>Passthrough VR com Interação</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <script>
      // 1. Componente da Câmera no Fundo (Passthrough)
      AFRAME.registerComponent('passthrough-celular', {
        init: function () {
          var cena = this.el;
          var video = document.createElement('video');
          video.setAttribute('autoplay', '');
          video.setAttribute('muted', '');
          video.setAttribute('playsinline', '');
          video.id = 'webcam-feed';
          video.style.display = 'none';
          document.body.appendChild(video);

          navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
          .then(function (stream) {
            video.srcObject = stream;
            var fundoVideo = document.createElement('a-videosphere');
            fundoVideo.setAttribute('src', '#webcam-feed');
            fundoVideo.setAttribute('rotation', '0 -90 0');
            cena.appendChild(fundoVideo);
          })
          .catch(function (erro) {
            console.error('Erro na câmera:', erro);
          });
        }
      });

      // 2. Componente de Interação (O que acontece quando o aluno olha pro objeto)
      AFRAME.registerComponent('interativo', {
        init: function () {
          var elemento = this.el;
          var cores = ['#FF5733', '#33FF57', '#3357FF', '#F1C40F', '#9B59B6'];

          // Quando o cursor terminar de carregar (clique pelo olhar)
          elemento.addEventListener('click', function () {
            // Escolhe uma cor aleatória da lista acima
            var corAleatoria = cores[Math.floor(Math.random() * cores.length)];
            elemento.setAttribute('color', corAleatoria);
            
            // Pequeno pulo (animação) para mostrar que interagiu
            elemento.setAttribute('scale', '1.2 1.2 1.2');
            setTimeout(function() {
              elemento.setAttribute('scale', '1 1 1');
            }, 300);
          });
        }
      });
    </script>
  </head>
  <body>
    
    <a-scene passthrough-celular>
      
      <a-box position="0 1.5 -3" rotation="0 45 0" color="#4CC3D9" interativo
             animation="property: rotation; to: 0 405 0; loop: true; dur: 5000"
             class="clicavel"> </a-box>

      <a-text value="Olhe para o cubo para interagir" position="0 2.3 -3" align="center" color="#FFFFFF" width="5"></a-text>

      <a-light type="ambient" color="#FFF"></a-light>

      <a-entity camera position="0 1.6 0" look-controls>
        
        <a-cursor fuse="true" fuse-timeout="1500" 
                  color="white" 
                  raycaster="objects: .clicavel"
                  animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 1500; from: 1 1 1; to: 0.1 0.1 0.1"
                  animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 150; from: 0.1 0.1 0.1; to: 1 1 1"
                  animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeInCubic; dur: 500; to: 1 1 1">
        </a-cursor>

      </a-entity>
      
    </a-scene>
  </body>
</html>
