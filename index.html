<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiraMunguba Pro - Gerador de Horários</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased h-screen flex flex-col">

    <header class="bg-gray-800 border-b border-gray-700 p-4 shadow-md flex justify-between items-center z-10 relative">
        <div class="flex items-center space-x-2">
            <span class="text-xl">📅</span>
            <h1 class="text-lg md:text-xl font-bold tracking-wide text-indigo-400">LiraMunguba Pro</h1>
        </div>
        <div class="flex space-x-2">
            <button onclick="gerarGradeCompleta()" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm md:text-base font-semibold px-3 py-2 rounded shadow transition duration-200">
                ⚡ Gerar
            </button>
            <button onclick="limparGrade()" class="bg-gray-700 hover:bg-gray-600 text-gray-200 text-sm md:text-base px-3 py-2 rounded transition duration-200">
                🧹 Limpar
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden">
        
        <aside class="w-full lg:w-80 bg-gray-800 border-b lg:border-r border-gray-700 p-4 overflow-y-auto max-h-48 lg:max-h-full space-y-4">
            <div>
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Selecione o Turno</h2>
                <select id="select-turno" onchange="alternarVisualizacaoTurno()" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500">
                    <option value="1">1º Turno (Matutino/Vespertino)</option>
                    <option value="2">2º Turno (Vespertino/Noturno)</option>
                </select>
            </div>

            <div class="hidden lg:block">
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Regras de Reunião de Área (12h-15h)</h2>
                <ul class="text-xs space-y-1 text-gray-400">
                    <li><span class="text-red-400 font-bold">Seg:</span> Natureza</li>
                    <li><span class="text-red-400 font-bold">Ter:</span> Humanas</li>
                    <li><span class="text-red-400 font-bold">Qua:</span> Linguagens</li>
                    <li><span class="text-red-400 font-bold">Qui:</span> Matemática</li>
                </ul>
            </div>
        </aside>

        <section class="flex-1 p-4 overflow-auto bg-gray-900">
            
            <div id="painel-turno-1" class="bg-gray-800 border border-gray-700 rounded-xl p-3 shadow-lg">
                <h2 class="text-base font-bold text-indigo-400 mb-3">1º Turno — Escola Munguba do Jari</h2>
                <div class="overflow-x-auto">
                    <table class="w-full min-w-[600px] border-collapse border border-gray-700 text-xs text-center">
                        <thead>
                            <tr class="bg-gray-700 text-gray-200 uppercase text-[10px] tracking-wider">
                                <th class="p-2 border border-gray-600 w-16">Dia</th>
                                <th class="p-2 border border-gray-600 w-24">Horário</th>
                                <th class="p-2 border border-gray-600 bg-gray-900">1º A</th>
                                <th class="p-2 border border-gray-600 bg-gray-900">2º A</th>
                                <th class="p-2 border border-gray-600 bg-gray-900">3º A</th>
                            </tr>
                        </thead>
                        <tbody id="grid-body-turno-1"></tbody>
                    </table>
                </div>
            </div>

            <div id="painel-turno-2" class="bg-gray-800 border border-gray-700 rounded-xl p-3 shadow-lg hidden">
                <h2 class="text-base font-bold text-teal-400 mb-3">2º Turno — Escola Munguba do Jari</h2>
                <div class="overflow-x-auto">
                    <table class="w-full min-w-[600px] border-collapse border border-gray-700 text-xs text-center">
                        <thead>
                            <tr class="bg-gray-700 text-gray-200 uppercase text-[10px] tracking-wider">
                                <th class="p-2 border border-gray-600 w-16">Dia</th>
                                <th class="p-2 border border-gray-600 w-24">Horário</th>
                                <th class="p-2 border border-gray-600 bg-gray-900">2º B</th>
                                <th class="p-2 border border-gray-600 bg-gray-900">2º C</th>
                                <th class="p-2 border border-gray-600 bg-gray-900">3º B</th>
                            </tr>
                        </thead>
                        <tbody id="grid-body-turno-2"></tbody>
                    </table>
                </div>
            </div>

        </section>
    </main>

    <script>
        // CONFIGURAÇÕES BASE
        const DIAS = ["SEGUNDA", "TERÇA", "QUARTA", "QUINTA", "SEXTA"];
        
        const HORARIOS_TURNO_1 = [
            "7h30-8h20", "8h20-9h10", "LANCHE", 
            "9h30-10h20", "10h20-11h10", "11h10-12h", 
            "ALMOÇO", "12h50-13h40", "13h40-14h30"
        ];

        const HORARIOS_TURNO_2 = [
            "15h30-16h20", "16h20-17h10", "LANCHE", 
            "17h30-18h20", "18h20-19h10", "19h10-20h", 
            "JANTAR", "20h20-21h20", "21h10-22h"
        ];

        // BANCO DE DADOS (Exemplo da sua matriz)
        const COMPONENTES = [
            { nome: "Mat-Michel", prof: "Michel", area: "Matemática", turmas: ["3A", "2B", "2C"] },
            { nome: "Pi2Mat-Michel", prof: "Michel", area: "Matemática", turmas: ["2A", "2F", "2E"] },
            { nome: "Hist-Carolina", prof: "Carolina", area: "Humanas", turmas: ["1A", "3B"] },
            { nome: "L.Port-Milene", prof: "Milene", area: "Linguagens", turmas: ["1A", "2C"] },
            { nome: "Fis-Jeferson", prof: "Jeferson", area: "Natureza", turmas: ["1A", "3A"] },
            { nome: "PV-Maira", prof: "Maira", area: "Humanas", turmas: ["3A", "2B", "2C", "2E"] },
            { nome: "L.Port-Adriana", prof: "Adriana", area: "Linguagens", turmas: ["3A", "2B", "3B", "3D"] },
            { nome: "Mat-Cherry", prof: "Cherry", area: "Matemática", turmas: ["2A", "3C"] }
        ];

        let gradeTurno1 = {};
        let gradeTurno2 = {};

        function inicializarEstruturas() {
            DIAS.forEach(dia => {
                gradeTurno1[dia] = HORARIOS_TURNO_1.map(() => ({ "1A": null, "2A": null, "3A": null }));
                gradeTurno2[dia] = HORARIOS_TURNO_2.map(() => ({ "2B": null, "2C": null, "3B": null }));
            });
        }

        function alternarVisualizacaoTurno() {
            const turno = document.getElementById("select-turno").value;
            if (turno === "1") {
                document.getElementById("painel-turno-1").classList.remove("hidden");
                document.getElementById("painel-turno-2").classList.add("hidden");
            } else {
                document.getElementById("painel-turno-1").classList.add("hidden");
                document.getElementById("painel-turno-2").classList.remove("hidden");
            }
        }

        function validarConflito(dia, indexHorario, turma, componente, turnoAlvo) {
            const prof = componente.prof;
            const area = componente.area;

            // Bloqueio de Reunião de Área (Pós-Almoço no 1º Turno)
            if (turnoAlvo === 1 && (indexHorario === 7 || indexHorario === 8)) {
                if (dia === "SEGUNDA" && area === "Natureza") return false;
                if (dia === "TERÇA" && area === "Humanas") return false;
                if (dia === "QUARTA" && area === "Linguagens") return false;
                if (dia === "QUINTA" && area === "Matemática") return false;
            }

            // Checa se professor já está em outra turma no mesmo horário
            const gradeDoTurno = turnoAlvo === 1 ? gradeTurno1[dia][indexHorario] : gradeTurno2[dia][indexHorario];
            for (let t in gradeDoTurno) {
                if (gradeDoTurno[t] && gradeDoTurno[t].prof === prof) {
                    return false;
                }
            }
            return true;
        }

        function gerarGradeCompleta() {
            inicializarEstruturas();

            [1, 2].forEach(turno => {
                const turmasDoTurno = turno === 1 ? ["1A", "2A", "3A"] : ["2B", "2C", "3B"];
                const horariosDoTurno = turno === 1 ? HORARIOS_TURNO_1 : HORARIOS_TURNO_2;
                const gradeAlvo = turno === 1 ? gradeTurno1 : gradeTurno2;

                DIAS.forEach(dia => {
                    horariosDoTurno.forEach((horario, idx) => {
                        if (horario === "LANCHE" || horario === "ALMOÇO" || horario === "JANTAR") return;

                        if (dia === "QUARTA" && (idx === 0 || idx === 1)) {
                            turmasDoTurno.forEach(t => {
                                gradeAlvo[dia][idx][t] = { nome: "ELETIVA", prof: "Todos" };
                            });
                            return;
                        }

                        turmasDoTurno.forEach(turma => {
                            const componentesValidos = COMPONENTES.filter(c => c.turmas.includes(turma));
                            
                            // Embaralha para não gerar a mesma grade sempre
                            componentesValidos.sort(() => Math.random() - 0.5);

                            for (let comp of componentesValidos) {
                                if (validarConflito(dia, idx, turma, comp, turno)) {
                                    gradeAlvo[dia][idx][turma] = comp;
                                    break;
                                }
                            }
                        });
                    });
                });
            });

            renderizarGradesEmTela();
        }

        function renderizarGradesEmTela() {
            // Turno 1
            const tbody1 = document.getElementById("grid-body-turno-1");
            tbody1.innerHTML = "";
            DIAS.forEach(dia => {
                HORARIOS_TURNO_1.forEach((horario, idx) => {
                    let tr = document.createElement("tr");
                    tr.className = "hover:bg-gray-750 border-b border-gray-700/50";
                    if (idx === 0) tr.innerHTML = `<td class="p-2 font-bold bg-gray-850 border-r border-gray-700" rowspan="${HORARIOS_TURNO_1.length}">${dia.substring(0,3)}</td>`;
                    
                    tr.innerHTML += `<td class="p-1 text-gray-400 bg-gray-900/30 text-[10px] md:text-xs">${horario}</td>`;

                    if (horario === "LANCHE" || horario === "ALMOÇO") {
                        tr.innerHTML += `<td colspan="3" class="bg-amber-950/40 text-amber-500 py-1 text-[10px] font-bold tracking-widest">${horario}</td>`;
                    } else {
                        ["1A", "2A", "3A"].forEach(t => {
                            const aula = gradeTurno1[dia][idx][t];
                            let estilo = aula ? (aula.nome === "ELETIVA" ? "bg-amber-800/80 text-amber-100" : "bg-indigo-950/60 text-indigo-200") : "text-gray-600";
                            tr.innerHTML += `<td class="p-1 border-l border-gray-700/60 ${estilo}">${aula ? aula.nome : "-"}</td>`;
                        });
                    }
                    tbody1.appendChild(tr);
                });
            });

            // Turno 2
            const tbody2 = document.getElementById("grid-body-turno-2");
            tbody2.innerHTML = "";
            DIAS.forEach(dia => {
                HORARIOS_TURNO_2.forEach((horario, idx) => {
                    let tr = document.createElement("tr");
                    tr.className = "hover:bg-gray-750 border-b border-gray-700/50";
                    if (idx === 0) tr.innerHTML = `<td class="p-2 font-bold bg-gray-850 border-r border-gray-700" rowspan="${HORARIOS_TURNO_2.length}">${dia.substring(0,3)}</td>`;
                    
                    tr.innerHTML += `<td class="p-1 text-gray-400 bg-gray-900/30 text-[10px] md:text-xs">${horario}</td>`;

                    if (horario === "LANCHE" || horario === "JANTAR") {
                        tr.innerHTML += `<td colspan="3" class="bg-teal-950/40 text-teal-400 py-1 text-[10px] font-bold tracking-widest">${horario}</td>`;
                    } else {
                        ["2B", "2C", "3B"].forEach(t => {
                            const aula = gradeTurno2[dia][idx][t];
                            let estilo = aula ? (aula.nome === "ELETIVA" ? "bg-amber-800/80 text-amber-100" : "bg-teal-950/40 text-teal-200") : "text-gray-600";
                            tr.innerHTML += `<td class="p-1 border-l border-gray-700/60 ${estilo}">${aula ? aula.nome : "-"}</td>`;
                        });
                    }
                    tbody2.appendChild(tr);
                });
            });
        }

        function limparGrade() {
            inicializarEstruturas();
            renderizarGradesEmTela();
        }

        inicializarEstruturas();
        renderizarGradesEmTela();
    </script>
</body>
</html>
