<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Projeto AR - Interação com o Mundo Real</title>
    <!-- Importando a biblioteca do A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>
  <body>
    <!-- Configurando o WebXR para solicitar o recurso de hit-test -->
    <a-scene webxr="optionalFeatures: hit-test;">
      
      <!-- Este ambiente virtual (chão e céu) vai sumir quando entrar no modo AR -->
      <a-entity hide-on-enter-ar>
        <a-sky color="#ECECEC"></a-sky>
        <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
      </a-entity>

      <!-- Objeto 3D que permanecerá visível na Realidade Aumentada -->
      <a-box position="0 0.5 -3" rotation="0 45 0" color="#4CC3D9" 
             animation="property: rotation; to: 0 405 0; loop: true; dur: 3000">
      </a-box>

      <!-- Controle de câmera padrão -->
      <a-entity camera position="0 1.6 0"></a-entity>
      
    </a-scene>
  </body>
</html>
