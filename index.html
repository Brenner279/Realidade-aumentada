<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Projeto VR com Passthrough</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <script>
      // Componente customizado para capturar a câmera e colocar no fundo
      AFRAME.registerComponent('fundo-camera', {
        init: function () {
          var cena = this.el;
          
          // Cria um elemento de vídeo invisível no HTML
          var video = document.createElement('video');
          video.setAttribute('autoplay', '');
          video.setAttribute('muted', '');
          video.setAttribute('playsinline', ''); // Essencial para funcionar no celular
          video.id = 'webcam';
          video.style.display = 'none';
          document.body.appendChild(video);

          // Pede acesso à câmera traseira (environment) do celular
          navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then(function (stream) {
              video.srcObject = stream;
              
              // Cria uma esfera gigante (céu) usando o vídeo da câmera como textura
              var ceu = document.createElement('a-videosphere');
              ceu.setAttribute('src', '#webcam');
              // Ajusta a rotação para alinhar melhor a câmera com a visão
              ceu.setAttribute('rotation', '0 -90 0'); 
              cena.appendChild(ceu);
            })
            .catch(function (erro) {
              console.error('Erro ao acessar a câmera:', erro);
              alert('Por favor, permita o acesso à câmera para ver o ambiente real.');
            });
        }
      });
    </script>
  </head>
  <body>
    <a-scene fundo-camera>
      
      <a-cone position="0 1.5 -4" radius-bottom="0.8" height="1.5" color="#FFC65D" 
              animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
      </a-cone>

      <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
      <a-light type="directional" position="-1 1 1" intensity="0.5"></a-light>

      <a-entity camera position="0 1.6 0" look-controls></a-entity>
      
    </a-scene>
  </body>
</html>
