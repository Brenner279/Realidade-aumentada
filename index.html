<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Horários - Escola Munguba do Jari</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Ajuste para garantir que tabelas grandes fiquem legíveis */
        .table-container {
            max-height: calc(100vh - 200px);
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased">

    <header class="bg-gray-800 border-b border-gray-700 p-4 shadow-md flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <span class="text-2xl">📅</span>
            <h1 class="text-xl font-bold tracking-wide text-indigo-400">LiraMunguba Pro</h1>
        </div>
        <div class="flex space-x-2">
            <button onclick="gerarGrade()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-4 py-2 rounded-lg shadow transition duration-200">
                ⚡ Gerar Grade Horária
            </button>
            <button class="bg-gray-700 hover:bg-gray-600 text-gray-200 px-4 py-2 rounded-lg transition duration-200">
                📤 Exportar PDF
            </button>
        </div>
    </header>

    <main class="flex h-[calc(100vh-73px)] overflow-hidden">
        
        <aside class="w-80 bg-gray-800 border-r border-gray-700 p-4 overflow-y-auto space-y-6">
            
            <div>
                <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Professores e Áreas</h2>
                <div class="bg-gray-750 p-3 rounded-lg border border-gray-700 space-y-2">
                    <div class="flex justify-between items-center bg-gray-700 p-2 rounded text-xs">
                        <span>Prof. Michel (Matemática)</span>
                        <span class="bg-indigo-900 text-indigo-300 px-1.5 py-0.5 rounded text-[10px]">Qui - Reunião</span>
                    </div>
                    <div class="flex justify-between items-center bg-gray-700 p-2 rounded text-xs">
                        <span>Profª Carolina (Humanas)</span>
                        <span class="bg-amber-900 text-amber-300 px-1.5 py-0.5 rounded text-[10px]">Ter - Reunião</span>
                    </div>
                    <div class="flex justify-between items-center bg-gray-700 p-2 rounded text-xs">
                        <span>Profª Milene (Linguagens)</span>
                        <span class="bg-emerald-900 text-emerald-300 px-1.5 py-0.5 rounded text-[10px]">Qua - Reunião</span>
                    </div>
                    <button class="w-full mt-2 border border-dashed border-gray-600 hover:border-indigo-500 text-gray-400 hover:text-indigo-400 py-1.5 rounded text-xs transition">
                        + Adicionar Professor
                    </button>
                </div>
            </div>

            <div>
                <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Filtro de Visualização</h2>
                <label class="block text-xs text-gray-400 mb-1">Selecione o Turno:</label>
                <select id="filtro-turno" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500">
                    <option value="1">1º Turno (Regular/Fundamental/Médio)</option>
                    <option value="2">2º Turno (Médio Integral Noturno)</option>
                </select>
            </div>

            <div>
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Legenda do Sistema</h3>
                <div class="space-y-1 text-xs">
                    <div class="flex items-center space-x-2"><span class="w-3 h-3 bg-indigo-600 rounded-full inline-block"></span> <span>Aulas Regulares</span></div>
                    <div class="flex items-center space-x-2"><span class="w-3 h-3 bg-amber-600 rounded-full inline-block"></span> <span>Eletivas (Bloqueio)</span></div>
                    <div class="flex items-center space-x-2"><span class="w-3 h-3 bg-red-600 rounded-full inline-block"></span> <span>Reunião de Área (ATPC)</span></div>
                </div>
            </div>

        </aside>

        <section class="flex-1 p-6 overflow-auto space-y-8">
            
            <div id="container-turno-1" class="bg-gray-800 border border-gray-700 rounded-xl p-4 shadow-lg">
                <div class="
